<head>

    <title>Notion Calendar Embed</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
            background-color: transparent; /* Seamlessly blends into Notion */
            overflow: hidden;
        }
        .calendar-container {
            width: 100%;
            height: 100vh;
            display: flex;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
