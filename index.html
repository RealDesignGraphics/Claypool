<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Calendar Embed</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
            background-color: transparent; /* Seamlessly blends into Notion */
            overflow: hidden;
        }
        .calendar-container {
            width: 100%;
            height: 100vh;
            display: flex;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
<iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=America%2FChicago&showPrint=0&mode=WEEK&showTz=0&showTitle=0&src=Yy5jbGF5cG9vbEBnbWFpbC5jb20&src=Y29yaW5uZUB2ZXJkYW50ZWFydGhzb2x1dGlvbnMuY29t&color=%230b8043&color=%23ad1457" style="border-width:0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
</body>
</html>
